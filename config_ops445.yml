---
- hosts: vmlab
  user: student
  become: yes

  vars:
    seneca_id: aabonifacio
    lab_dirs:
      - /home/aabonifacio/ops445/lab1
      - /home/aabonifacio/ops445/lab2
      - /home/aabonifacio/ops445/lab3
      - /home/aabonifacio/ops445/lab4
      - /home/aabonifacio/ops445/lab5
      - /home/aabonifacio/ops445/lab6
      - /home/aabonifacio/ops445/lab7
      - /home/aabonifacio/ops445/lab8

  tasks:
    - name: install epel-release
      yum:
        name: epel-release
        state: present

    - name: update apache
      yum:
        name: httpd
        state: latest

    - name: remove tree package
      yum:
        name: tree
        state: absent

    - name: set hostname
      hostname:
        name: "{{ seneca_id }}"

    - name: create new user
      user:
        name: "{{ seneca_id }}"
        groups: wheel
        append: yes
        create_home: yes
        state: present

    - name: create ssh directory
      file:
        path: "/home/{{ seneca_id }}/.ssh"
        state: directory
        owner: "{{ seneca_id }}"
        group: "{{ seneca_id }}"
        mode: '0700'

    - name: install authorized key for new user
      authorized_key:
        user: "{{ seneca_id }}"
        state: present
        key: "{{ lookup('file', '/home/aabonifacio/.ssh/id_ed25519.pub') }}"

    - name: allow wheel group passwordless sudo
      copy:
        dest: /etc/sudoers.d/ops445-wheel
        content: "%wheel ALL=(ALL) NOPASSWD: ALL\n"
        owner: root
        group: root
        mode: '0440'

    - name: create ops445 base directory
      file:
        path: "/home/{{ seneca_id }}/ops445"
        state: directory
        owner: "{{ seneca_id }}"
        group: "{{ seneca_id }}"
        mode: '0755'

    - name: create lab directories
      file:
        path: "{{ item }}"
        state: directory
        owner: "{{ seneca_id }}"
        group: "{{ seneca_id }}"
        mode: '0755'
      loop: "{{ lab_dirs }}"
